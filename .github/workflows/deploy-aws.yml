name: Deploy to AWS S3

# Manual deploy until AWS credentials and bucket are configured.
# See deploy/aws/README.md for setup instructions.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package site
        run: bash deploy/build.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ secrets.AWS_S3_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=3600" \
            --exclude "*.html" \
            --exclude "*.jpg" \
            --exclude "*.png" \
            --exclude "*.webp"
          aws s3 sync dist/ "s3://${{ secrets.AWS_S3_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*" \
            --include "*.html"
          aws s3 sync dist/ "s3://${{ secrets.AWS_S3_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=86400" \
            --exclude "*" \
            --include "*.jpg" \
            --include "*.png" \
            --include "*.webp"

      - name: Invalidate CloudFront cache
        if: vars.AWS_CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
